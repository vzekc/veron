name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: veron
          POSTGRES_PASSWORD: veron
          POSTGRES_DB: veron
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      VERON_DB_HOST: localhost
      VERON_DB_PORT: "5432"
      VERON_DB_NAME: veron
      VERON_DB_USER: veron
      VERON_DB_PASSWORD: veron

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install SBCL and s3270
        run: |
          sudo apt-get update
          sudo apt-get install -y sbcl s3270

      - name: Cache Quicklisp
        uses: actions/cache@v4
        with:
          path: ~/quicklisp
          key: quicklisp-${{ runner.os }}

      - name: Cache FASL files
        uses: actions/cache@v4
        with:
          path: ~/.cache/common-lisp
          key: fasl-${{ runner.os }}-${{ hashFiles('**/*.lisp', '**/*.asd') }}

      - name: Install Quicklisp
        run: |
          if [ ! -f "$HOME/quicklisp/setup.lisp" ]; then
            curl -o /tmp/quicklisp.lisp https://beta.quicklisp.org/quicklisp.lisp
            sbcl --non-interactive \
              --load /tmp/quicklisp.lisp \
              --eval '(quicklisp-quickstart:install)' \
              --eval '(ql-util:without-prompting (ql:add-to-init-file))'
          fi

      - name: Run tests
        run: |
          sbcl --non-interactive \
            --load "$HOME/quicklisp/setup.lisp" \
            --load run-tests.lisp
