name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Deploy to retrostar
        uses: appleboy/ssh-action@v1
        with:
          host: retrostar.classic-computing.de
          username: veron
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: /opt/veron/deploy/deploy.sh
